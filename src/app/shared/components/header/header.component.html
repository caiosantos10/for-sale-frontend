<header class="header-shell">
  <div class="brand-area">
    <img src="/brand-icon.svg" alt="Branch icon" class="mat-icon-rtl-mirror" class="brand-icon">
    <span class="brand-chip">For Sale</span>
  </div>

  @if (isLoggedIn) {
    <nav class="main-nav" aria-label="Logged Menu">
      @for (item of menuItems; track item.label) {
        <a class="main-nav--link" [routerLink]="item.route">{{ item.label }}</a>
      }
    </nav>
  } @else {
  <nav class="main-nav" aria-label="Menu">
    <a class="main-nav--link" [routerLink]="'/home'">Home</a>
    <a class="main-nav--link" [routerLink]="'/home'">About us</a>
    <a class="main-nav--link" [routerLink]="'/home'">Reviews</a>
    <a class="main-nav--link" [routerLink]="'/home'">FAQ</a>
  </nav>
  }

  <div class="user-menu" [class.user-menu--open]="isUserMenuOpen">
    @if (!isLoggedIn) {
      <div class="auth-link-wrapper" aria-label="Acesso da conta">
        <a class="auth-link" [routerLink]="'/auth/login'">Login</a>
        <span class="auth-link" style="text-decoration: none;">or</span>
        <a class="auth-link" [routerLink]="'/auth/register'">Register</a>
      </div>
    }

    @if (isLoggedIn) {
      <button
        class="user-menu__trigger"
        type="button"
        aria-haspopup="menu"
        [attr.aria-expanded]="isUserMenuOpen"
        (click)="toggleUserMenu()"
      >
        <mat-icon class="user-menu__fallback" aria-hidden="true">person</mat-icon>
        <!-- @if (userPhotoUrl) {
          <img class="user-menu__photo" [src]="userPhotoUrl" alt="Foto do usuário" />
        } @else  {
          <mat-icon class="user-menu__fallback" aria-hidden="true">person</mat-icon>
        }
        -->
      </button>

      @if (isUserMenuOpen) {
        <div class="user-menu__panel" role="menu" aria-label="Opções da conta">
          @for (item of userMenuItems; track item.label) {
            <a class="user-menu__item" [routerLink]="item.route" role="menuitem" (click)="closeUserMenu()">
              {{ item.label }}
            </a>
          }

          <button
            class="user-menu__item user-menu__item--auth"
            type="button"
            role="menuitem"
            (click)="logout()">
            Logout
          </button>
        </div>
      }
    }
  </div>

</header>
